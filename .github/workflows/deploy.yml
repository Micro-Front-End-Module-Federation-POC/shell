name: Build and Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - master   # or master, depending on your branch name

permissions:
  contents: write  # needed for GH Pages deployment

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repo
      - uses: actions/checkout@v3

      # Step 2: Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # Step 3: Install dependencies
      - name: Install Dependencies
        run: npm ci

      # Step 4: Build Angular app
      - name: Build Angular App
        run: |
          npx ng build --configuration=production --base-href=/my-project/

      # Step 5: Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/my-project   # path to your dist folder
          publish_branch: gh-pages         # branch where pages will be deployed
